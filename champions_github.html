*{margin:0;padding:0;box-sizing:border-box}
body{

.sidebar{

}
.sidebar h1{

}
.sidebar h1 small{font-size:10px;color:#555;font-weight:400;letter-spacing:0}
.sbar{flex-shrink:0;padding:8px 10px 4px}
.sbar input{
  width:100%;padding:9px 12px;border:1px solid rgba(255,255,255,0.08);border-radius:6px;

}
.tags{display:flex;gap:4px;flex-wrap:wrap;padding:6px 10px 4px;flex-shrink:0}
.tag{font-size:16px;padding:6px 20px;border-radius:18px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02);color:#777;cursor:pointer;font-family:inherit;transition:.1s;}
.tag.on{background:rgba(200,140,255,0.12);border-color:rgba(200,140,255,0.25);color:#e8d8f0}
.cnt{font-size:14px;color:#555;padding:4px 12px 6px;flex-shrink:0}
.list{flex:1;overflow-y:auto;padding:2px 4px;display:grid;grid-template-columns:1fr 1fr;gap:6px;align-content:start;padding:4px 8px}

.list::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:4px}
.hero{
  display:flex;align-items:center;gap:10px;padding:6px 8px;border-radius:6px;
  cursor:pointer;transition:.1s;border:1px solid transparent;border-bottom:1px solid rgba(255,255,255,0.04);

.dt{display:flex;gap:3px;padding:14px 32px 10px;flex-wrap:wrap;border-bottom:1px solid rgba(255,255,255,0.03)}

.dt button .ki{display:inline-flex}
.dt button.on .ki{background:none}

.dt button .v{font-size:12px;color:#4caf50;margin-left:2px;position:absolute;top:2px;right:2px}.dt button .kl{font-size:11px;font-weight:700;color:#888;margin-left:4px}.dt button.on .kl{color:#fff;font-size:12px}

.ac{display:none;padding:20px 32px 32px}
.ac.on{display:block}
.sh{display:flex;gap:14px;align-items:flex-start;max-width:720px}
.sh .si{width:56px;height:56px;border-radius:10px;border:2px solid rgba(200,140,255,0.15);flex-shrink:0}
.stxt{flex:1;min-width:0}
.ac h3{font-size:26px;color:#f0e6ff;margin:0 0 2px 0}
.ac .en{font-size:14px;color:#666;margin:0 0 2px 0}

.ac .vw video{display:block;width:100%;max-height:450px;object-fit:contain;background:#000}
.ac .vs{display:flex;align-items:center;gap:6px;padding:5px 10px;font-size:13px;color:#666;border-top:1px solid rgba(255,255,255,0.03)}
.ac .vs .dot{width:5px;height:5px;border-radius:50%;display:inline-block}
.ac .vs .dot.g{background:#4caf50}
.ac .no-vid{display:flex;align-items:center;gap:20px;padding:16px 0}

  var h='<div class=dh>'
    +'<img src="https://ddragon.leagueoflegends.com/cdn/'+V+'/img/champion/'+c.en+'.png">'
    +'<div class=i><h2>'+c.title_cn+'</h2><div class=sub>'+c.zh+' &middot; '+c.title_en+' &middot; ';
  for(var i=0;i<c.tags.length;i++){h+=TZ[c.tags[i]];if(i<c.tags.length-1)h+='/'}
  h+='</div></div></div>';

  var spells=[{p:true,k:'P',n:cd.passive.name,d:cd.passive.description,img:'passive',f:cd.passive.image.full}];
  for(var i=0;i<cd.spells.length;i++){
    var s=cd.spells[i];
    spells.push({p:false,k:'QWER'[i],n:s.name,d:s.description,img:'spell',f:s.image.full,c:s.cooldownBurn,o:s.costBurn,r:s.rangeBurn});
  }

  h+='<div class=dt>';
  for(var i=0;i<spells.length;i++){
    var s=spells[i];
    var hv=c.video[s.k];
    var su='https://ddragon.leagueoflegends.com/cdn/'+V+'/img/'+s.img+'/'+s.f;
    h+='<button class="'+(i===0?' on':'')+'" onclick="Q(this,\''+s.k+'\')">'
      +'<span class=ki><img src="'+su+'" class=spell-icon></span><span class=kl>'+s.k+'</span>'
      +(hv?'<span class=v>&#9679;</span>':'')
      +'</button>';
  }
  h+='</div>';

  for(var i=0;i<spells.length;i++){
    var s=spells[i];
    var hv=c.video[s.k];
    var vbase='https://lol.dyn.riotcdn.net/x/videos/champion-abilities/'+c.key+'/ability_'+c.key+'_'+s.k+'1';
    var vpMp4=vbase+'.mp4';
    var vpWebm=vbase+'.webm';
    var meta=[];
    if(s.c)meta.push('\u51b7\u5374: '+s.c);
    if(s.o)meta.push('\u6d88\u8017: '+s.o);
    if(s.r)meta.push('\u8303\u56f4: '+s.r);
    var su='https://ddragon.leagueoflegends.com/cdn/'+V+'/img/'+s.img+'/'+s.f;

    h+='<div class="ac'+(i===0?' on':'')+'" data-a="'+s.k+'">'
      +'<div class=sh><img src="'+su+'" class=si>'
      +'<div class=stxt><h3>'+(s.p?'\u88ab\u52a8 &mdash; ':'')+s.n+'</h3>'
      +'<div class=en>'+s.k+(s.p?' &middot; \u88ab\u52a8\u6280\u80fd':'')+'</div>'
      +(meta.length?'<div class=meta>'+meta.join(' &middot; ')+'</div>':'')
      +'<div class=desc>'+s.d+'</div>'
      +'</div></div>'
      +(hv
        ?'<div class=vw><video controls preload=metadata><source src="'+vpMp4+'" type=video/mp4><source src="'+vpWebm+'" type=video/webm></video>'
          +'<div class=vs><span class="dot g"></span>技能演示视频</div></div>'
        :'<div class=no-vid><img src="'+su+'"><div class=l>\u6280\u80fd\u89c6\u9891\u6682\u4e0d\u53ef\u7528</div></div>')
      +'</div>';
  }

  d.innerHTML=h;
  document.querySelector('.main').scrollTop=0;
  var hs=document.querySelectorAll('.hero');
  for(var i=0;i<hs.length;i++){hs[i].className='hero'+(hs[i].dataset.e===en?' checked':'')}
}

function Q(btn,k){
  var p=btn.parentElement;
  var bs=p.querySelectorAll('button');
  for(var i=0;i<bs.length;i++){bs[i].className=''}
  btn.className='on';
  var d=document.getElementById('detail');
  var acs=d.querySelectorAll('.ac');
  for(var i=0;i<acs.length;i++){acs[i].className='ac'}
  var t=d.querySelector('.ac[data-a="'+k+'"]');
  if(t){
    t.className='ac on';
    var v=t.querySelector('video');
    if(v){
      var vs=d.querySelectorAll('video');
      for(var i=0;i<vs.length;i++){if(vs[i]!==v)vs[i].pause()}
      setTimeout(function(){try{v.play()}catch(e){}},100);
    }
  }
}

document.addEventListener('keydown',function(e){
  if(e.key==='Escape'&&sel){
    sel=null;
    document.getElementById('detail').style.display='none';
    document.getElementById('noSel').style.display='flex';
    var hs=document.querySelectorAll('.hero');
    for(var i=0;i<hs.length;i++){hs[i].className='hero'}
    var vs=document.querySelectorAll('video');
    for(var i=0;i<vs.length;i++){vs[i].pause()}
    return;
  }
  if(!sel)return;
  var k=e.key.toUpperCase();
  if('PQWER'.indexOf(k)>=0){
    var idx='PQWER'.indexOf(k)+1;
    var b=document.querySelector('.dt button:nth-child('+idx+')');
    if(b)b.click();
  }
});

switchMode('hero');
</script>
</body>
</html>
